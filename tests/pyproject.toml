[tool.pytest.ini_options]
# asyncio_mode = "auto" means every async test function is treated as an
# asyncio test without needing @pytest.mark.asyncio on each one.
# We still add the decorator explicitly in the test files for clarity, but
# this setting ensures they are never silently skipped or run synchronously.
addopts = "-p no:pytest-qt"
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
# Collect tests from the tests/ directory.
testpaths = ["tests"]


# Surface every warning as an error except the FastAPI on_event deprecation
# warning (which appears in older FastAPI versions before lifespan was added).

filterwarnings = [
    "error",
    "ignore:.*on_event is deprecated.*:DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]